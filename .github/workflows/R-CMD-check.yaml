# For help debugging build failures open an issue on the RStudio community with the 'github-actions' tag.
# https://community.rstudio.com/new-topic?category=Package%20development&tags=github-actions
on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

name: R-CMD-check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macOS-latest,   r: 'release'}
          - {os: windows-latest, r: 'devel'}
          - {os: windows-latest, r: 'release'}
          - {os: windows-latest, r: 'oldrel-1'}
          - {os: windows-latest, r: 'oldrel-2'}
          - {os: ubuntu-latest,   r: 'devel'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}
          - {os: ubuntu-latest,   r: 'oldrel-2'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true

    steps:
      - uses: actions/checkout@v4

      # setup-pandoc occasionally fails with HTTP 5xx when its CDN blips.
      # Three attempts with continue-on-error ride out transient failures.
      - id: pandoc1
        continue-on-error: true
        uses: r-lib/actions/setup-pandoc@v2
      - if: steps.pandoc1.outcome == 'failure'
        id: pandoc2
        continue-on-error: true
        uses: r-lib/actions/setup-pandoc@v2
      - if: steps.pandoc1.outcome == 'failure' && steps.pandoc2.outcome == 'failure'
        uses: r-lib/actions/setup-pandoc@v2

      - uses: PredictiveEcology/actions/install-spatial-deps@v0.2

      - uses: r-lib/actions/setup-r@v2
        with:
          Ncpus: 2
          r-version: ${{ matrix.config.r }}
          use-public-rspm: false

      - id: deps
        continue-on-error: true
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Pin pak stable; devel-pak occasionally regresses on resolve.
          pak-version: stable
          extra-packages: |
            any::rcmdcheck
            NLMR=?ignore
          needs: check

      # Retry fallback for setup-r-dependencies. Catches transient
      # "Cannot query GitHub" / pkgdepends resolution errors that hit
      # individual matrix entries (windows-latest release was the
      # casualty today).
      - name: Install R deps (retry fallback)
        if: steps.deps.outcome == 'failure'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 60
          retry_on: error
          shell: 'Rscript {0}'
          command: |
            install.packages("pak", repos = "https://r-lib.github.io/p/pak/stable/")
            pak::local_install_dev_deps(ask = FALSE, dependencies = TRUE)
            pak::pkg_install(c("any::rcmdcheck"), ask = FALSE)

      - name: Install additional package dependencies
        run: |
          pak::pkg_install("ropensci/NLMR")
        shell: Rscript {0}

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
